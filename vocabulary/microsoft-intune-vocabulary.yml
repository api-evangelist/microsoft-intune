name: Microsoft Intune Domain Vocabulary
provider: Microsoft Intune
providerId: microsoft-intune
description: Tag-derived vocabulary for the Microsoft Intune API surface; sourced from openapi/ tags.
terms:
- term: Device Compliance Policies
  description: Operations for managing device compliance policies. Compliance policies define rules and settings that a device
    must comply with to be considered compliant.
- term: Device Configurations
  description: Operations for managing device configuration profiles. Configuration profiles define settings that are applied
    to enrolled devices.
- term: Managed Devices
  description: Operations for managing devices enrolled in Intune. Includes listing, retrieving, creating, updating, and deleting
    managed device records.
- term: Remote Actions
  description: Remote actions that can be performed on managed devices, including retire, wipe, sync, remote lock, reset passcode,
    and reboot.
