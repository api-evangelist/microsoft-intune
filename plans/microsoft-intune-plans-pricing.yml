specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Microsoft Intune
providerId: microsoft-intune
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Endpoint Management
  - MDM
  - MAM
  - Intune
  - Microsoft
description: Microsoft Intune is sold as a tiered per-user subscription (Plan 1, Plan 2, Suite) with several
  per-user add-ons (Endpoint Privilege Management, Remote Help, Advanced Analytics, Enterprise Application
  Management, Microsoft Cloud PKI). Plan 1 is also bundled into Microsoft 365 E3 / E5 / F3 and Enterprise
  Mobility + Security (EMS) E3 / E5. Programmatic access is via Microsoft Graph and is included with the
  seat licence at no incremental per-call charge.
sources:
  - https://www.microsoft.com/en-us/security/business/microsoft-intune-pricing
  - https://learn.microsoft.com/en-us/intune/intune-service/
plans:
  - id: microsoft-intune-plan-1
    name: Microsoft Intune Plan 1
    type: subscription
    description: Cross-platform endpoint management, mobile application management, endpoint security,
      Configuration Manager co-management. $8.00/user/month, paid yearly.
    entries:
      - label: Per user, paid yearly
        name: intune_plan_1
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '8.00'
        userMultiplied: true
    elements:
      - name: Cross-platform endpoint management (Windows, macOS, iOS, Android, Linux)
      - name: Built-in endpoint security
      - name: Mobile application management (MAM)
      - name: Endpoint analytics
      - name: Microsoft Configuration Manager (co-management)
  - id: microsoft-intune-plan-2
    name: Microsoft Intune Plan 2
    type: subscription
    description: Add-on to Plan 1; advanced endpoint management. $4.00/user/month, paid yearly.
    entries:
      - label: Per user add-on, paid yearly
        name: intune_plan_2
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '4.00'
        userMultiplied: true
    elements:
      - name: Microsoft Intune Tunnel for MAM
      - name: Specialty device management (AR/VR, smart screens)
      - name: Firmware-over-the-air (FOTA) updates
  - id: microsoft-intune-suite
    name: Microsoft Intune Suite
    type: subscription
