- name: Intune Device Management API
  description: >-
    The Microsoft Graph Device Management API enables programmatic management of
    devices enrolled in Intune, including listing managed devices, performing
    remote actions such as wipe and retire, and retrieving device compliance
    state and configuration status.
  humanURL: https://learn.microsoft.com/en-us/graph/api/resources/intune-devices-manageddevice?view=graph-rest-1.0
  baseURL: https://graph.microsoft.com/v1.0/deviceManagement
  tags:
  - devices
  - managed devices
  - remote actions
  - device compliance
  properties:
  - type: X-documentation
    url: https://learn.microsoft.com/en-us/graph/api/resources/intune-devices-manageddevice?view=graph-rest-1.0
  - type: X-openapi
